<style>
:root{
  --brand:#4B2ECC;--brand-light:#7C5CFC;--brand-glow:#9F7AFF;
  --bday:#FFB347;--success:#22C55E;
  --bg:#0A0812;--bg3:#1a1436;
  --surface:#1f1740;--surface2:#271e50;
  --border:rgba(127,90,255,0.18);--border2:rgba(127,90,255,0.35);
  --text:#F0ECFF;--text2:#A99FCC;--text3:#6B6090;
  --font:'Plus Jakarta Sans',sans-serif;
  --r:16px;--rsm:10px;--nav:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:var(--font);color:var(--text)}

/* ── Phone shell ── */
.phone{
  width:100%;max-width:430px;height:100dvh;
  margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
@media(min-width:500px){
  body{background:#030209;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .phone{height:min(860px,96dvh);border-radius:48px;border:1px solid rgba(127,90,255,0.22);box-shadow:0 0 0 9px #0a0815,0 32px 80px rgba(30,10,100,0.55)}
}
.glow-top{position:absolute;top:-100px;left:0;right:0;height:340px;background:radial-gradient(ellipse at 50% 0%,rgba(124,92,252,0.2) 0%,transparent 68%);pointer-events:none;z-index:0}

/* ── Header ── */
.header{
  flex-shrink:0;padding:56px 22px 14px;
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr-sub{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--brand-glow);margin-bottom:3px}
.hdr-title{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em;line-height:1}
.logo{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--brand),var(--brand-light));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 0 0 1px rgba(159,122,255,0.3),0 0 20px rgba(124,92,252,0.45);
  flex-shrink:0;
}

/* ── Scroll area ── */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 22px calc(var(--nav) + 20px);
  position:relative;z-index:5;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.scroll::-webkit-scrollbar{display:none}

/* ── Bottom nav ── */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  height:var(--nav);padding:10px 16px 22px;
  display:flex;gap:6px;
  background:linear-gradient(to top,var(--bg) 60%,transparent);
  z-index:20;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;background:none;border:none;cursor:pointer;
  color:var(--text3);font-family:var(--font);font-size:11px;font-weight:500;
  border-radius:var(--rsm);position:relative;transition:color .18s;
}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .18s}
.nb.active{color:var(--brand-glow)}
.nb.active::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:20px;height:2.5px;background:var(--brand-glow);border-radius:2px;
  box-shadow:0 0 10px var(--brand-glow);
}

/* ── Month nav ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-label{font-size:17px;font-weight:600;color:var(--text)}
.mn-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.mn-btn:hover{background:var(--surface2)}
.mn-btn:active{transform:scale(.93)}

/* ── Calendar grid ── */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.dh{font-size:11px;color:var(--text3);text-align:center;padding:4px 0;font-weight:500}
.dc{
  aspect-ratio:1;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);
  border:1px solid transparent;transition:background .12s,transform .1s;
  user-select:none;
}
.dc:hover{background:var(--surface)}
.dc:active{transform:scale(.9)}
.dc.today{background:var(--surface);color:var(--brand-glow);border-color:var(--border2);font-weight:700}
.dc.sel{background:var(--brand);color:#fff;box-shadow:0 0 16px rgba(124,92,252,0.5);border-color:transparent}
.dc.sel.today{background:var(--brand)}
.dc.om{color:var(--text3);opacity:.25;pointer-events:none}
.dots{display:flex;gap:3px;margin-top:3px}
.dot{width:4px;height:4px;border-radius:50%}
.dot-e{background:var(--brand-glow)}
.dot-b{background:var(--bday)}

/* ── Legend ── */
.legend{display:flex;gap:14px;margin-bottom:16px;padding:0 2px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}

/* ── Day detail header ── */
.day-label{
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin:0 0 12px;
}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:12px;
}
.card-row{display:flex;align-items:flex-start;gap:14px}
.icon-box{
  width:44px;height:44px;border-radius:var(--rsm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;
}
.ic-ev{background:rgba(124,92,252,0.18);border:1px solid var(--border2)}
.ic-bd{background:rgba(255,179,71,0.15);border:1px solid rgba(255,179,71,0.28)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3}
.card-sub{font-size:12px;color:var(--text2);line-height:1.5}
.card-desc{font-size:11.5px;color:var(--text3);margin-top:6px;line-height:1.55}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;margin-top:8px;letter-spacing:.03em}
.tag-ev{background:rgba(124,92,252,0.18);color:var(--brand-glow);border:1px solid rgba(124,92,252,0.3)}
.tag-free{background:rgba(34,197,94,0.14);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.tag-bd{background:rgba(255,179,71,0.14);color:var(--bday);border:1px solid rgba(255,179,71,0.28)}
.badge-free{
  display:inline-flex;align-items:center;
  background:#22c55e;color:#fff;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;
  letter-spacing:.05em;margin-left:6px;
}

/* ── Avatar ── */
.avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;flex-shrink:0;
}

/* ── Birthday rows ── */
.bd-row{
  display:flex;align-items:center;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.bd-row:last-child{border-bottom:none}
.bd-name{font-size:14px;font-weight:500;color:var(--text)}
.bd-date{font-size:12px;color:var(--text3);margin-top:2px}
.bd-state{font-size:11px;color:var(--text3)}
.bd-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bd-today{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.bd-soon{background:rgba(255,179,71,0.14);color:var(--bday);border:1px solid rgba(255,179,71,0.28)}

/* ── Search & pills ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round}
.search-box{
  width:100%;padding:11px 14px 11px 36px;
  border-radius:var(--rsm);border:1px solid var(--border);
  background:var(--surface);color:var(--text);
  font-size:13px;font-family:var(--font);
  transition:border-color .15s;
}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{outline:none;border-color:var(--border2)}
.pill-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:3px}
.pill-row::-webkit-scrollbar{display:none}
.pill{
  padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;white-space:nowrap;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-family:var(--font);
  transition:all .15s;
}
.pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* ── Misc ── */
.slabel{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:0 0 12px}
.sec-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:16px 0}
.count-badge{
  display:inline-block;font-size:11px;font-weight:600;
  color:var(--text3);margin-left:6px;
}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;line-height:1.7}
.empty-icon{font-size:28px;margin-bottom:8px}

/* ── Month strip for bdays ── */
.month-strip{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:3px}
.month-strip::-webkit-scrollbar{display:none}
.ms-btn{
  min-width:48px;padding:7px 10px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;white-space:nowrap;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-family:var(--font);
  transition:all .15s;text-align:center;
}
.ms-btn.active{background:var(--bday);color:#1a0a00;border-color:var(--bday);font-weight:600}

.fade-in{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Export buttons ── */
.export-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.exp-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 11px;border-radius:20px;cursor:pointer;
  border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);
  font-size:11px;font-weight:500;font-family:var(--font);
  transition:all .15s;white-space:nowrap;
  text-decoration:none;
}
.exp-btn:hover{border-color:var(--border2);color:var(--text);background:#2e2460}
.exp-btn:active{transform:scale(.94)}
.exp-btn img{width:13px;height:13px;object-fit:contain;flex-shrink:0}
.exp-apple{border-color:rgba(255,255,255,0.12)}
.exp-google{border-color:rgba(66,133,244,0.3)}
.exp-google:hover{border-color:rgba(66,133,244,0.6)}
.exp-outlook{border-color:rgba(0,114,198,0.3)}
.exp-outlook:hover{border-color:rgba(0,114,198,0.6)}
.exp-yahoo{border-color:rgba(99,0,153,0.3)}
.exp-yahoo:hover{border-color:rgba(99,0,153,0.6)}

/* ── Toast ── */
.toast{
  position:absolute;bottom:calc(var(--nav) + 14px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#1f1740;border:1px solid var(--border2);
  border-radius:20px;padding:9px 18px;
  font-size:12px;font-weight:500;color:var(--text);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

/* ── HELPERS ── */
function pp(s){const[y,m,d]=s.split('-').map(Number);return{y,m,d}}
function ini(fn){return fn.split(/[\s\/,]+/).filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')}
function pal(i){return PALETTES[i%PALETTES.length]}
function dayEvs(d,m,y){return eventos.filter(e=>{const p=pp(e.date);return p.d===d&&p.m===m+1&&p.y===y})}
function dayBd(d,m){return embaixadores.filter(b=>b.d===d&&b.m===m+1)}
function isToday(d,m,y){return d===hoje.getDate()&&m===hoje.getMonth()&&y===hoje.getFullYear()}
function daysTo(b){
  const now=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());
  let nx=new Date(hoje.getFullYear(),b.m-1,b.d);
  if(nx<now) nx=new Date(hoje.getFullYear()+1,b.m-1,b.d);
  return Math.round((nx-now)/864e5);
}

function evCard(ev, showDate=false){
  const p=pp(ev.date);
  const fb=ev.tipo==='free'?`<span class="badge-free">FREE</span>`:'';
  const tagCls=ev.tipo==='free'?'tag-free':'tag-ev';
  const tagLbl=ev.tipo==='free'?'Gratuito p/ embaixadores':'Evento';
  const dateLn=showDate?`<div class="card-sub">${String(p.d).padStart(2,'0')}/${String(p.m).padStart(2,'0')}/${p.y}</div>`:'';
  return `<div class="card"><div class="card-row">
    <div class="icon-box ic-ev">
      <span style="font-size:15px;font-weight:700;color:var(--brand-glow);line-height:1">${p.d}</span>
      <span style="font-size:10px;color:var(--text3);margin-top:1px">${MESES3[p.m-1]}</span>
    </div>
    <div style="flex:1;min-width:0">
      <div class="card-title">${ev.title}${fb}</div>
      ${dateLn}
      <div class="card-sub">${ev.time} · ${ev.local}</div>
      ${ev.desc?`<div class="card-desc">${ev.desc}</div>`:''}
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="tag ${tagCls}" style="margin-top:8px">${tagLbl}</span>
        <div class="export-row">${exportBtns(ev.id)}</div>
      </div>
    </div>
  </div></div>`;
}

function bdCardToday(b){
  const[bg,clr]=pal(embaixadores.indexOf(b));
  return `<div class="card"><div class="card-row">
    <div class="avatar" style="background:${bg};color:${clr};width:44px;height:44px;font-size:14px">${ini(b.fn)}</div>
    <div style="flex:1">
      <div class="card-title">${b.fn}</div>
      <div class="card-sub">🎂 Aniversário hoje! · ${b.e}</div>
      <span class="tag tag-bd">Embaixador(a)</span>
    </div>
  </div></div>`;
}

/* ── AGENDA (calendar month view) ── */
function renderCal(){
  const first=new Date(curY,curM,1).getDay();
  const lastD=new Date(curY,curM+1,0).getDate();
  const prevL=new Date(curY,curM,0).getDate();

  let h=`<div class="month-nav">
    <button class="mn-btn" onclick="chM(-1)">‹</button>
    <span class="month-label">${MESES[curM]} ${curY}</span>
    <button class="mn-btn" onclick="chM(1)">›</button>
  </div>
  <div class="cal">
    <div class="dh">D</div><div class="dh">S</div><div class="dh">T</div>
    <div class="dh">Q</div><div class="dh">Q</div><div class="dh">S</div><div class="dh">S</div>`;

  for(let i=0;i<first;i++) h+=`<div class="dc om">${prevL-first+1+i}</div>`;
  for(let d=1;d<=lastD;d++){
    const isSel=d===selD, isTod=isToday(d,curM,curY)&&!isSel;
    const evs=dayEvs(d,curM,curY), bds=dayBd(d,curM);
    let dots='';
    if(evs.length) dots+=`<span class="dot dot-e"></span>`;
    if(bds.length) dots+=`<span class="dot dot-b"></span>`;
    h+=`<div class="dc${isTod?' today':''}${isSel?' sel':''}" onclick="selDay(${d})">${d}${dots?`<div class="dots">${dots}</div>`:''}</div>`;
  }
  const rem=42-first-lastD;
  for(let i=1;i<=rem;i++) h+=`<div class="dc om">${i}</div>`;
  h+=`</div>`;

  // legend
  h+=`<div class="legend">
    <div class="leg"><span class="dot dot-e" style="width:6px;height:6px;flex-shrink:0"></span>Evento</div>
    <div class="leg"><span class="dot dot-b" style="width:6px;height:6px;flex-shrink:0"></span>Aniversário</div>
  </div>`;

  // selected day
  const evs=dayEvs(selD,curM,curY), bds=dayBd(selD,curM);
  const lbl=isToday(selD,curM,curY)
    ?`Hoje · ${selD} de ${MESES[curM]}`
    :`${selD} de ${MESES[curM]}`;
  h+=`<div class="day-label">${lbl}</div>`;

  if(!evs.length&&!bds.length){
    h+=`<div class="empty"><div class="empty-icon">✦</div>Nenhum evento<br>ou aniversário neste dia</div>`;
  }
  bds.forEach(b=>h+=bdCardToday(b));
  evs.forEach(ev=>h+=evCard(ev));

  document.getElementById('v-cal').innerHTML=h;
}

/* ── EVENTOS ── */
function renderEv(){
  const now=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());
  const sorted=[...eventos].sort((a,b)=>a.date.localeCompare(b.date));
  const upcoming=sorted.filter(e=>new Date(e.date)>=now);
  const past=sorted.filter(e=>new Date(e.date)<now);
  let h='';

  if(upcoming.length){
    h+=`<div class="sec-title">Próximos <span class="count-badge">${upcoming.length}</span></div>`;
    upcoming.forEach(ev=>h+=evCard(ev,true));
  }
  if(past.length){
    if(upcoming.length) h+=`<div class="divider"></div>`;
    h+=`<div class="slabel">Passados</div>`;
    past.forEach(ev=>{
      const p=pp(ev.date);
      const fb=ev.tipo==='free'?`<span class="badge-free">FREE</span>`:'';
      h+=`<div class="card" style="opacity:.42"><div class="card-row">
        <div class="icon-box ic-ev">
          <span style="font-size:15px;font-weight:700;color:var(--brand-glow);line-height:1">${p.d}</span>
          <span style="font-size:10px;color:var(--text3);margin-top:1px">${MESES3[p.m-1]}</span>
        </div>
        <div><div class="card-title">${ev.title}${fb}</div>
        <div class="card-sub">${String(p.d).padStart(2,'0')}/${String(p.m).padStart(2,'0')} · ${ev.time} · ${ev.local}</div></div>
      </div></div>`;
    });
  }
  if(!eventos.length) h=`<div class="empty"><div class="empty-icon">📅</div>Nenhum evento ainda.</div>`;
  document.getElementById('v-ev').innerHTML=h;
}

/* ── ANIVERSÁRIOS ── */
function renderBd(){
  const list=embaixadores.map((b,i)=>({...b,days:daysTo(b),idx:i})).sort((a,b)=>a.days-b.days);
  const filt=filterMes===0?list:list.filter(b=>b.m===filterMes);
  const show=bdSearch
    ?filt.filter(b=>b.fn.toLowerCase().includes(bdSearch.toLowerCase())||b.n.toLowerCase().includes(bdSearch.toLowerCase()))
    :filt;

  // next upcoming badge
  const nextUp=list.filter(b=>b.days<=30);

  let h=`<div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-box" type="text" placeholder="Buscar embaixador…" value="${bdSearch}" oninput="bdS(this.value)">
  </div>`;

  // month filter strip
  h+=`<div class="month-strip">
    <button class="ms-btn${filterMes===0?' active':''}" onclick="setMF(0)">Todos</button>`;
  for(let i=1;i<=12;i++)
    h+=`<button class="ms-btn${filterMes===i?' active':''}" onclick="setMF(${i})">${MESES3[i-1]}</button>`;
  h+=`</div>`;

  h+=`<div class="slabel">${show.length} embaixador${show.length!==1?'es':''}</div>`;

  show.forEach(b=>{
    const[bg,clr]=pal(b.idx);
    const isHj=b.days===0||b.days===365;
    let badge='';
    if(isHj) badge=`<span class="bd-badge bd-today">🎂 Hoje!</span>`;
    else if(b.days<=7) badge=`<span class="bd-badge bd-soon">em ${b.days}d</span>`;
    else if(b.days<=30) badge=`<span class="bd-badge bd-soon" style="opacity:.7">em ${b.days}d</span>`;
    h+=`<div class="bd-row">
      <div class="avatar" style="background:${bg};color:${clr}">${ini(b.fn)}</div>
      <div style="flex:1;min-width:0">
        <div class="bd-name">${b.fn}</div>
        <div class="bd-date">${String(b.d).padStart(2,'0')} de ${MESES[b.m-1]} · <span class="bd-state">${b.e}</span></div>
      </div>
      ${badge}
    </div>`;
  });

  document.getElementById('v-bd').innerHTML=h;
}

/* ── NAVIGATION ── */
function goTab(t){
  curTab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('nb-'+t).classList.add('active');
  ['cal','ev','bd'].forEach(v=>{
    const el=document.getElementById('v-'+v);
    el.style.display='none';el.classList.remove('fade-in');
  });
  const el=document.getElementById('v-'+t);
  el.style.display=''; void el.offsetWidth; el.classList.add('fade-in');
  const titles={cal:'Agenda',ev:'Eventos',bd:'Aniversários'};
  document.getElementById('view-title').textContent=titles[t];
  document.getElementById('scroll').scrollTop=0;
  if(t==='cal') renderCal();
  else if(t==='ev') renderEv();
  else renderBd();
}

/* ── Calendar export ── */
function pad2(n){return String(n).padStart(2,'0')}

function parseEvTime(timeStr, dateStr){
  const p=pp(dateStr);
  const base=p.y+''+pad2(p.m)+''+pad2(p.d);
  const matches=timeStr.match(/\d{1,2}:\d{2}/g);
  if(!matches) return {ds:'DTSTART;VALUE=DATE:'+base, de:'DTEND;VALUE=DATE:'+base, allDay:true, sh:'09', sm:'00', eh:'11', em:'00'};
  const s=matches[0].split(':'); const sh=pad2(+s[0]), sm=pad2(+s[1]);
  if(matches.length>=2){
    const e=matches[1].split(':'); const eh=pad2(+e[0]), em=pad2(+e[1]);
    return {ds:'DTSTART;TZID=America/Sao_Paulo:'+base+'T'+sh+sm+'00',
            de:'DTEND;TZID=America/Sao_Paulo:'+base+'T'+eh+em+'00',
            allDay:false, sh, sm, eh, em, base};
  }
  const eh=pad2((+sh+2)%24);
  return {ds:'DTSTART;TZID=America/Sao_Paulo:'+base+'T'+sh+sm+'00',
          de:'DTEND;TZID=America/Sao_Paulo:'+base+'T'+eh+sm+'00',
          allDay:false, sh, sm, eh:eh, em:sm, base};
}

function esc(s){return (s||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;')}
function encURI(s){return encodeURIComponent(s||'')}

function makeICS(ev){
  const {ds,de}=parseEvTime(ev.time, ev.date);
  const now=new Date();
  const stamp=now.getUTCFullYear()+''+pad2(now.getUTCMonth()+1)+''+pad2(now.getUTCDate())
             +'T'+pad2(now.getUTCHours())+pad2(now.getUTCMinutes())+pad2(now.getUTCSeconds())+'Z';
  const uid='ab2lgenz-'+Date.now()+'@ab2lgenzlaw.com';
  const CRLF='\r\n';
  const lines=[
    'BEGIN:VCALENDAR','VERSION:2.0',
    'PRODID:-//AB2L GenZ Law//Calendario//PT',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:'+uid,'DTSTAMP:'+stamp,
    ds, de,
    'SUMMARY:'+esc(ev.title),
    'LOCATION:'+esc(ev.local),
    'DESCRIPTION:'+esc((ev.desc||'')+' — AB2L GenZ Law'),
    'STATUS:CONFIRMED',
    'END:VEVENT','END:VCALENDAR'
  ];
  return lines.join(CRLF)+CRLF;
}

function googleCalURL(ev){
  const {base,sh,sm,eh,em,allDay}=parseEvTime(ev.time, ev.date);
  let dates;
  if(allDay){
    dates=base+'/'+base;
  } else {
    dates=base+'T'+sh+sm+'00/'+base+'T'+eh+em+'00';
  }
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encURI(ev.title)
    +'&dates='+encURI(dates)
    +'&location='+encURI(ev.local)
    +'&details='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function outlookURL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const startISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+sh+':'+sm+':00');
  const endISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+eh+':'+em+':00');
  return 'https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
    +'&subject='+encURI(ev.title)
    +'&startdt='+encURI(startISO)
    +'&enddt='+encURI(endISO)
    +'&location='+encURI(ev.local)
    +'&body='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function office365URL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const startISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+sh+':'+sm+':00');
  const endISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+eh+':'+em+':00');
  return 'https://outlook.office.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
    +'&subject='+encURI(ev.title)
    +'&startdt='+encURI(startISO)
    +'&enddt='+encURI(endISO)
    +'&location='+encURI(ev.local)
    +'&body='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function yahooURL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const st=p.y+''+pad2(p.m)+''+pad2(p.d)+'T'+sh+sm+'00';
  const et=p.y+''+pad2(p.m)+''+pad2(p.d)+'T'+eh+em+'00';
  return 'https://calendar.yahoo.com/?v=60&title='+encURI(ev.title)
    +'&st='+encURI(st)+'&et='+encURI(et)
    +'&in_loc='+encURI(ev.local)
    +'&desc='+encURI((ev.desc||'')+' — AB2L GenZ Law');
}

function exportBtns(id){
  const ev=eventos.find(x=>x.id===id);
  if(!ev) return '';
  return `
    <button class="exp-btn exp-apple" onclick="dlICS(${id},event)" title="Apple Calendar / iCal">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Apple
    </button>
    <a class="exp-btn exp-google" href="${googleCalURL(ev)}" target="_blank" rel="noopener" title="Google Calendar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Google
    </a>
    <a class="exp-btn exp-outlook" href="${outlookURL(ev)}" target="_blank" rel="noopener" title="Outlook Live">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0078D4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Outlook
    </a>
    <a class="exp-btn exp-outlook" href="${office365URL(ev)}" target="_blank" rel="noopener" title="Microsoft 365">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0078D4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Office 365
    </a>
    <a class="exp-btn exp-yahoo" href="${yahooURL(ev)}" target="_blank" rel="noopener" title="Yahoo Calendar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6001D2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Yahoo
    </a>`;
}

function dlICS(id, e){
  if(e) e.stopPropagation();
  const ev=eventos.find(x=>x.id===id);
  if(!ev) return;
  const blob=new Blob([makeICS(ev)],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=ev.title.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,50)+'.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('📅 Arquivo .ics baixado! Abra para adicionar ao calendário.');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3500);
}

function chM(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}selD=1;renderCal();}
function selDay(d){selD=d;renderCal();}
function setMF(m){filterMes=m;renderBd();}
function bdS(v){bdSearch=v;renderBd();}

renderCal();
</script>
