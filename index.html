<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AB2L GenZ Law · Calendário</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#4B2ECC;--brand-light:#7C5CFC;--brand-glow:#9F7AFF;
  --bday:#FFB347;--success:#22C55E;
  --bg:#0A0812;--bg3:#1a1436;
  --surface:#1f1740;--surface2:#271e50;
  --border:rgba(127,90,255,0.18);--border2:rgba(127,90,255,0.35);
  --text:#F0ECFF;--text2:#A99FCC;--text3:#6B6090;
  --font:'Plus Jakarta Sans',sans-serif;
  --r:16px;--rsm:10px;--nav:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:var(--font);color:var(--text)}

/* ── Phone shell ── */
.phone{
  width:100%;max-width:430px;height:100dvh;
  margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
@media(min-width:500px){
  body{background:#030209;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .phone{height:min(860px,96dvh);border-radius:48px;border:1px solid rgba(127,90,255,0.22);box-shadow:0 0 0 9px #0a0815,0 32px 80px rgba(30,10,100,0.55)}
}
.glow-top{position:absolute;top:-100px;left:0;right:0;height:340px;background:radial-gradient(ellipse at 50% 0%,rgba(124,92,252,0.2) 0%,transparent 68%);pointer-events:none;z-index:0}

/* ── Header ── */
.header{
  flex-shrink:0;padding:56px 22px 14px;
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr-sub{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--brand-glow);margin-bottom:3px}
.hdr-title{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em;line-height:1}
.logo{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--brand),var(--brand-light));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 0 0 1px rgba(159,122,255,0.3),0 0 20px rgba(124,92,252,0.45);
  flex-shrink:0;
}

/* ── Scroll area ── */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 22px calc(var(--nav) + 20px);
  position:relative;z-index:5;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.scroll::-webkit-scrollbar{display:none}

/* ── Bottom nav ── */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  height:var(--nav);padding:10px 16px 22px;
  display:flex;gap:6px;
  background:linear-gradient(to top,var(--bg) 60%,transparent);
  z-index:20;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;background:none;border:none;cursor:pointer;
  color:var(--text3);font-family:var(--font);font-size:11px;font-weight:500;
  border-radius:var(--rsm);position:relative;transition:color .18s;
}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke .18s}
.nb.active{color:var(--brand-glow)}
.nb.active::after{
  content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:20px;height:2.5px;background:var(--brand-glow);border-radius:2px;
  box-shadow:0 0 10px var(--brand-glow);
}

/* ── Month nav ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-label{font-size:17px;font-weight:600;color:var(--text)}
.mn-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.mn-btn:hover{background:var(--surface2)}
.mn-btn:active{transform:scale(.93)}

/* ── Calendar grid ── */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.dh{font-size:11px;color:var(--text3);text-align:center;padding:4px 0;font-weight:500}
.dc{
  aspect-ratio:1;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);
  border:1px solid transparent;transition:background .12s,transform .1s;
  user-select:none;
}
.dc:hover{background:var(--surface)}
.dc:active{transform:scale(.9)}
.dc.today{background:var(--surface);color:var(--brand-glow);border-color:var(--border2);font-weight:700}
.dc.sel{background:var(--brand);color:#fff;box-shadow:0 0 16px rgba(124,92,252,0.5);border-color:transparent}
.dc.sel.today{background:var(--brand)}
.dc.om{color:var(--text3);opacity:.25;pointer-events:none}
.dots{display:flex;gap:3px;margin-top:3px}
.dot{width:4px;height:4px;border-radius:50%}
.dot-e{background:var(--brand-glow)}
.dot-b{background:var(--bday)}

/* ── Legend ── */
.legend{display:flex;gap:14px;margin-bottom:16px;padding:0 2px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}

/* ── Day detail header ── */
.day-label{
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin:0 0 12px;
}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:12px;
}
.card-row{display:flex;align-items:flex-start;gap:14px}
.icon-box{
  width:44px;height:44px;border-radius:var(--rsm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;
}
.ic-ev{background:rgba(124,92,252,0.18);border:1px solid var(--border2)}
.ic-bd{background:rgba(255,179,71,0.15);border:1px solid rgba(255,179,71,0.28)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3}
.card-sub{font-size:12px;color:var(--text2);line-height:1.5}
.card-desc{font-size:11.5px;color:var(--text3);margin-top:6px;line-height:1.55}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;margin-top:8px;letter-spacing:.03em}
.tag-ev{background:rgba(124,92,252,0.18);color:var(--brand-glow);border:1px solid rgba(124,92,252,0.3)}
.tag-free{background:rgba(34,197,94,0.14);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.tag-bd{background:rgba(255,179,71,0.14);color:var(--bday);border:1px solid rgba(255,179,71,0.28)}
.badge-free{
  display:inline-flex;align-items:center;
  background:#22c55e;color:#fff;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;
  letter-spacing:.05em;margin-left:6px;
}

/* ── Avatar ── */
.avatar{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;flex-shrink:0;
}

/* ── Birthday rows ── */
.bd-row{
  display:flex;align-items:center;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.bd-row:last-child{border-bottom:none}
.bd-name{font-size:14px;font-weight:500;color:var(--text)}
.bd-date{font-size:12px;color:var(--text3);margin-top:2px}
.bd-state{font-size:11px;color:var(--text3)}
.bd-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bd-today{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.bd-soon{background:rgba(255,179,71,0.14);color:var(--bday);border:1px solid rgba(255,179,71,0.28)}

/* ── Search & pills ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round}
.search-box{
  width:100%;padding:11px 14px 11px 36px;
  border-radius:var(--rsm);border:1px solid var(--border);
  background:var(--surface);color:var(--text);
  font-size:13px;font-family:var(--font);
  transition:border-color .15s;
}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{outline:none;border-color:var(--border2)}
.pill-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:3px}
.pill-row::-webkit-scrollbar{display:none}
.pill{
  padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;white-space:nowrap;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-family:var(--font);
  transition:all .15s;
}
.pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* ── Misc ── */
.slabel{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:0 0 12px}
.sec-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:16px 0}
.count-badge{
  display:inline-block;font-size:11px;font-weight:600;
  color:var(--text3);margin-left:6px;
}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;line-height:1.7}
.empty-icon{font-size:28px;margin-bottom:8px}

/* ── Month strip for bdays ── */
.month-strip{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:3px}
.month-strip::-webkit-scrollbar{display:none}
.ms-btn{
  min-width:48px;padding:7px 10px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;white-space:nowrap;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-family:var(--font);
  transition:all .15s;text-align:center;
}
.ms-btn.active{background:var(--bday);color:#1a0a00;border-color:var(--bday);font-weight:600}

.fade-in{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

function goTab(t){
  curTab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('nb-'+t).classList.add('active');
  ['cal','ev','bd'].forEach(v=>{
    const el=document.getElementById('v-'+v);
    el.style.display='none';el.classList.remove('fade-in');
  });
  const el=document.getElementById('v-'+t);
  el.style.display=''; void el.offsetWidth; el.classList.add('fade-in');
  const titles={cal:'Agenda',ev:'Eventos',bd:'Aniversários'};
  document.getElementById('view-title').textContent=titles[t];
  document.getElementById('scroll').scrollTop=0;
  if(t==='cal') renderCal();
  else if(t==='ev') renderEv();
  else renderBd();
}

/* ── Calendar export ── */
function pad2(n){return String(n).padStart(2,'0')}

function parseEvTime(timeStr, dateStr){
  const p=pp(dateStr);
  const base=p.y+''+pad2(p.m)+''+pad2(p.d);
  const matches=timeStr.match(/\d{1,2}:\d{2}/g);
  if(!matches) return {ds:'DTSTART;VALUE=DATE:'+base, de:'DTEND;VALUE=DATE:'+base, allDay:true, sh:'09', sm:'00', eh:'11', em:'00'};
  const s=matches[0].split(':'); const sh=pad2(+s[0]), sm=pad2(+s[1]);
  if(matches.length>=2){
    const e=matches[1].split(':'); const eh=pad2(+e[0]), em=pad2(+e[1]);
    return {ds:'DTSTART;TZID=America/Sao_Paulo:'+base+'T'+sh+sm+'00',
            de:'DTEND;TZID=America/Sao_Paulo:'+base+'T'+eh+em+'00',
            allDay:false, sh, sm, eh, em, base};
  }
  const eh=pad2((+sh+2)%24);
  return {ds:'DTSTART;TZID=America/Sao_Paulo:'+base+'T'+sh+sm+'00',
          de:'DTEND;TZID=America/Sao_Paulo:'+base+'T'+eh+sm+'00',
          allDay:false, sh, sm, eh:eh, em:sm, base};
}

function esc(s){return (s||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;')}
function encURI(s){return encodeURIComponent(s||'')}

function makeICS(ev){
  const {ds,de}=parseEvTime(ev.time, ev.date);
  const now=new Date();
  const stamp=now.getUTCFullYear()+''+pad2(now.getUTCMonth()+1)+''+pad2(now.getUTCDate())
             +'T'+pad2(now.getUTCHours())+pad2(now.getUTCMinutes())+pad2(now.getUTCSeconds())+'Z';
  const uid='ab2lgenz-'+Date.now()+'@ab2lgenzlaw.com';
  const CRLF='\r\n';
  const lines=[
    'BEGIN:VCALENDAR','VERSION:2.0',
    'PRODID:-//AB2L GenZ Law//Calendario//PT',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:'+uid,'DTSTAMP:'+stamp,
    ds, de,
    'SUMMARY:'+esc(ev.title),
    'LOCATION:'+esc(ev.local),
    'DESCRIPTION:'+esc((ev.desc||'')+' — AB2L GenZ Law'),
    'STATUS:CONFIRMED',
    'END:VEVENT','END:VCALENDAR'
  ];
  return lines.join(CRLF)+CRLF;
}

function googleCalURL(ev){
  const {base,sh,sm,eh,em,allDay}=parseEvTime(ev.time, ev.date);
  let dates;
  if(allDay){
    dates=base+'/'+base;
  } else {
    dates=base+'T'+sh+sm+'00/'+base+'T'+eh+em+'00';
  }
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encURI(ev.title)
    +'&dates='+encURI(dates)
    +'&location='+encURI(ev.local)
    +'&details='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function outlookURL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const startISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+sh+':'+sm+':00');
  const endISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+eh+':'+em+':00');
  return 'https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
    +'&subject='+encURI(ev.title)
    +'&startdt='+encURI(startISO)
    +'&enddt='+encURI(endISO)
    +'&location='+encURI(ev.local)
    +'&body='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function office365URL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const startISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+sh+':'+sm+':00');
  const endISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+eh+':'+em+':00');
  return 'https://outlook.office.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
    +'&subject='+encURI(ev.title)
    +'&startdt='+encURI(startISO)
    +'&enddt='+encURI(endISO)
    +'&location='+encURI(ev.local)
    +'&body='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function yahooURL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const st=p.y+''+pad2(p.m)+''+pad2(p.d)+'T'+sh+sm+'00';
  const et=p.y+''+pad2(p.m)+''+pad2(p.d)+'T'+eh+em+'00';
  return 'https://calendar.yahoo.com/?v=60&title='+encURI(ev.title)
    +'&st='+encURI(st)+'&et='+encURI(et)
    +'&in_loc='+encURI(ev.local)
    +'&desc='+encURI((ev.desc||'')+' — AB2L GenZ Law');
}

    </a>`;
}

function dlICS(id, e){
  if(e) e.stopPropagation();
  const ev=eventos.find(x=>x.id===id);
  if(!ev) return;
  const blob=new Blob([makeICS(ev)],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=ev.title.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,50)+'.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('📅 Arquivo .ics baixado! Abra para adicionar ao calendário.');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3500);
}

function chM(d){curM+=d;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}selD=1;renderCal();}
function selDay(d){selD=d;renderCal();}
function setMF(m){filterMes=m;renderBd();}
function bdS(v){bdSearch=v;renderBd();}

  logo.addEventListener('pointerdown', ()=>{ t=setTimeout(()=>openAdm(), 600); });
  logo.addEventListener('pointerup',   ()=>clearTimeout(t));

      <button class="adm-cancel" onclick="closeAdm()">Cancelar</button>
      <button class="adm-save" onclick="doLogin()">Entrar</button>

async function doLogin(){
  const user = document.getElementById('adm-user').value.trim();
  const pass = document.getElementById('adm-pass').value;
  if(!user||!pass){ renderAdmLogin('Preencha usuário e senha'); return; }
  document.getElementById('adm-box').innerHTML='<div class="adm-loading">Entrando…</div>';
  try{
    const res = await fetch(API_URL+'/admin/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Erro');
    adminToken = data.token;
    localStorage.setItem('ab2l_token', adminToken);
    renderAdmPanel();
  }catch(e){ renderAdmLogin(e.message); }
}

function renderAdmPanel(){
  const sorted=[...eventos].sort((a,b)=>a.date.localeCompare(b.date));
  let cards = sorted.map(ev=>{
    const p=pp(ev.date);
    const tagCls=ev.tipo==='free'?'tag-free':ev.tipo==='interno'?'tag-int':'tag-ev';
    const tagLbl=ev.tipo==='free'?'Gratuito':ev.tipo==='interno'?'Interno':'Evento';
    return `<div class="adm-ev-card">
      <div class="adm-ev-title">${ev.title}</div>
      <div class="adm-ev-sub">${String(p.d).padStart(2,'0')}/${String(p.m).padStart(2,'0')}/${p.y}${ev.time?' · '+ev.time:''}</div>
      <div class="adm-ev-actions">
        <button class="adm-edit" onclick="renderAdmForm(${ev.id})">✏️ Editar</button>
        <button class="adm-del"  onclick="delEvento(${ev.id})">🗑 Excluir</button>

  }).join('');

  document.getElementById('adm-box').innerHTML=`
    <div class="adm-hdr">

      <button class="adm-logout" onclick="doLogout()">Sair da conta admin</button>
    </div>`;
}

function renderAdmForm(id){
  admEditId = id;
  const ev = id ? eventos.find(e=>e.id===id) : null;
  document.getElementById('adm-box').innerHTML=`
    <div class="adm-hdr">
      <h2>${ev?'Editar evento':'Novo evento'}</h2>

        <option value="free"    ${ev&&ev.tipo==='free'      ?'selected':''}>Gratuito p/ embaixadores</option>
        <option value="interno" ${ev&&ev.tipo==='interno'   ?'selected':''}>Interno</option>
      </select>
    </div>
    <div id="af-err" class="adm-err"></div>
    <div class="adm-btns">
      <button class="adm-cancel" onclick="renderAdmPanel()">Cancelar</button>
      <button class="adm-save" onclick="saveEvento()">Salvar</button>
    </div>`;
}

async function saveEvento(){
  const title = document.getElementById('af-title').value.trim();
  const date  = document.getElementById('af-date').value;
  if(!title||!date){ document.getElementById('af-err').textContent='Título e data são obrigatórios'; return; }
  const body = {
    title, date,
    time:  document.getElementById('af-time').value.trim(),
    local: document.getElementById('af-local').value.trim(),
    desc:  document.getElementById('af-desc').value.trim(),
    tipo:  document.getElementById('af-tipo').value,
  };
  try{
    const url  = admEditId ? `${API_URL}/admin/eventos/${admEditId}` : `${API_URL}/admin/eventos`;
    const meth = admEditId ? 'PUT' : 'POST';
    const res  = await fetch(url,{
      method:meth,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},
      body:JSON.stringify(body)
    });
    if(res.status===401){ doLogout(); return; }
    if(!res.ok){ const d=await res.json(); throw new Error(d.error||'Erro'); }
    await loadEventos();
    renderAdmPanel();
    showToast(admEditId?'✅ Evento atualizado!':'✅ Evento criado!');
  }catch(e){
    document.getElementById('af-err').textContent=e.message;
  }
}

async function delEvento(id){
  if(!confirm('Excluir este evento? Esta ação não pode ser desfeita.')) return;
  try{
    const res = await fetch(`${API_URL}/admin/eventos/${id}`,{
      method:'DELETE',
      headers:{'Authorization':'Bearer '+adminToken}
    });
    if(res.status===401){ doLogout(); return; }
    if(!res.ok) throw new Error('Erro ao excluir');
    await loadEventos();
    renderAdmPanel();
    showToast('🗑 Evento excluído.');
  }catch(e){ showToast('Erro: '+e.message); }
}

function doLogout(){
  adminToken=null;
  localStorage.removeItem('ab2l_token');
  closeAdm();
  showToast('Sessão encerrada.');
}

function pad2(n){return String(n).padStart(2,'0')}

function parseEvTime(timeStr, dateStr){
  const p=pp(dateStr);
  const base=p.y+''+pad2(p.m)+''+pad2(p.d);
  const matches=timeStr.match(/\d{1,2}:\d{2}/g);
  if(!matches) return {ds:'DTSTART;VALUE=DATE:'+base, de:'DTEND;VALUE=DATE:'+base, allDay:true, sh:'09', sm:'00', eh:'11', em:'00'};
  const s=matches[0].split(':'); const sh=pad2(+s[0]), sm=pad2(+s[1]);
  if(matches.length>=2){
    const e=matches[1].split(':'); const eh=pad2(+e[0]), em=pad2(+e[1]);
    return {ds:'DTSTART;TZID=America/Sao_Paulo:'+base+'T'+sh+sm+'00',
            de:'DTEND;TZID=America/Sao_Paulo:'+base+'T'+eh+em+'00',
            allDay:false, sh, sm, eh, em, base};
  }
  const eh=pad2((+sh+2)%24);
  return {ds:'DTSTART;TZID=America/Sao_Paulo:'+base+'T'+sh+sm+'00',
          de:'DTEND;TZID=America/Sao_Paulo:'+base+'T'+eh+sm+'00',
          allDay:false, sh, sm, eh:eh, em:sm, base};
}

function esc(s){return (s||'').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;')}
function encURI(s){return encodeURIComponent(s||'')}

function makeICS(ev){
  const {ds,de}=parseEvTime(ev.time, ev.date);
  const now=new Date();
  const stamp=now.getUTCFullYear()+''+pad2(now.getUTCMonth()+1)+''+pad2(now.getUTCDate())
             +'T'+pad2(now.getUTCHours())+pad2(now.getUTCMinutes())+pad2(now.getUTCSeconds())+'Z';
  const uid='ab2lgenz-'+Date.now()+'@ab2lgenzlaw.com';
  const CRLF='\r\n';
  const lines=[
    'BEGIN:VCALENDAR','VERSION:2.0',
    'PRODID:-//AB2L GenZ Law//Calendario//PT',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:'+uid,'DTSTAMP:'+stamp,
    ds, de,
    'SUMMARY:'+esc(ev.title),
    'LOCATION:'+esc(ev.local),
    'DESCRIPTION:'+esc((ev.desc||'')+' — AB2L GenZ Law'),
    'STATUS:CONFIRMED',
    'END:VEVENT','END:VCALENDAR'
  ];
  return lines.join(CRLF)+CRLF;
}

function googleCalURL(ev){
  const {base,sh,sm,eh,em,allDay}=parseEvTime(ev.time, ev.date);
  let dates;
  if(allDay){
    dates=base+'/'+base;
  } else {
    dates=base+'T'+sh+sm+'00/'+base+'T'+eh+em+'00';
  }
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encURI(ev.title)
    +'&dates='+encURI(dates)
    +'&location='+encURI(ev.local)
    +'&details='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function outlookURL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const startISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+sh+':'+sm+':00');
  const endISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+eh+':'+em+':00');
  return 'https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
    +'&subject='+encURI(ev.title)
    +'&startdt='+encURI(startISO)
    +'&enddt='+encURI(endISO)
    +'&location='+encURI(ev.local)
    +'&body='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function office365URL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const startISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+sh+':'+sm+':00');
  const endISO=p.y+'-'+pad2(p.m)+'-'+pad2(p.d)+(allDay?'':'T'+eh+':'+em+':00');
  return 'https://outlook.office.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
    +'&subject='+encURI(ev.title)
    +'&startdt='+encURI(startISO)
    +'&enddt='+encURI(endISO)
    +'&location='+encURI(ev.local)
    +'&body='+encURI((ev.desc||'')+'\n\nAB2L GenZ Law');
}

function yahooURL(ev){
  const p=pp(ev.date);
  const {sh,sm,eh,em,allDay}=parseEvTime(ev.time,ev.date);
  const st=p.y+''+pad2(p.m)+''+pad2(p.d)+'T'+sh+sm+'00';
  const et=p.y+''+pad2(p.m)+''+pad2(p.d)+'T'+eh+em+'00';
  return 'https://calendar.yahoo.com/?v=60&title='+encURI(ev.title)
    +'&st='+encURI(st)+'&et='+encURI(et)
    +'&in_loc='+encURI(ev.local)
    +'&desc='+encURI((ev.desc||'')+' — AB2L GenZ Law');
}

function dlICS(id, e){
  if(e) e.stopPropagation();
  const ev=eventos.find(x=>x.id===id);
  if(!ev) return;
  const blob=new Blob([makeICS(ev)],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=ev.title.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,50)+'.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('📅 Arquivo .ics baixado! Abra para adicionar ao calendário.');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3500);
}

let admEditId = null;

// Long-press on logo (600ms) opens admin
(function(){
  const logo = document.querySelector('.logo');
  let t;
  logo.addEventListener('pointerdown', ()=>{ t=setTimeout(()=>openAdm(), 600); });
  logo.addEventListener('pointerup',   ()=>clearTimeout(t));
  logo.addEventListener('pointerleave',()=>clearTimeout(t));
})();

function openAdm(){
  if(adminToken) renderAdmPanel();
  else renderAdmLogin();
  document.getElementById('adm-overlay').classList.add('open');
}
function closeAdm(){
  document.getElementById('adm-overlay').classList.remove('open');
  admEditId=null;
}
document.getElementById('adm-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('adm-overlay')) closeAdm();
});

function renderAdmLogin(err=''){
  document.getElementById('adm-box').innerHTML=`
    <div class="adm-hdr">
      <h2>Admin ⚙️</h2>
      <button class="adm-close" onclick="closeAdm()">✕</button>
    </div>
    <div class="adm-field"><label>Usuário</label><input id="adm-user" type="text" placeholder="admin" autocomplete="username"></div>
    <div class="adm-field"><label>Senha</label><input id="adm-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    ${err?`<div class="adm-err">${err}</div>`:''}
    <div class="adm-btns">
      <button class="adm-cancel" onclick="closeAdm()">Cancelar</button>
      <button class="adm-save" onclick="doLogin()">Entrar</button>
    </div>`;
}

async function doLogin(){
  const user = document.getElementById('adm-user').value.trim();
  const pass = document.getElementById('adm-pass').value;
  if(!user||!pass){ renderAdmLogin('Preencha usuário e senha'); return; }
  document.getElementById('adm-box').innerHTML='<div class="adm-loading">Entrando…</div>';
  try{
    const res = await fetch(API_URL+'/admin/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Erro');
    adminToken = data.token;
    localStorage.setItem('ab2l_token', adminToken);
    renderAdmPanel();
  }catch(e){ renderAdmLogin(e.message); }
}

function renderAdmPanel(){
  const sorted=[...eventos].sort((a,b)=>a.date.localeCompare(b.date));
  let cards = sorted.map(ev=>{
    const p=pp(ev.date);
    const tagCls=ev.tipo==='free'?'tag-free':ev.tipo==='interno'?'tag-int':'tag-ev';
    const tagLbl=ev.tipo==='free'?'Gratuito':ev.tipo==='interno'?'Interno':'Evento';
    return `<div class="adm-ev-card">
      <div class="adm-ev-title">${ev.title}</div>
      <div class="adm-ev-sub">${String(p.d).padStart(2,'0')}/${String(p.m).padStart(2,'0')}/${p.y}${ev.time?' · '+ev.time:''}</div>
      <div class="adm-ev-actions">
        <button class="adm-edit" onclick="renderAdmForm(${ev.id})">✏️ Editar</button>
        <button class="adm-del"  onclick="delEvento(${ev.id})">🗑 Excluir</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('adm-box').innerHTML=`
    <div class="adm-hdr">
      <h2>Gerenciar Eventos</h2>
      <button class="adm-close" onclick="closeAdm()">✕</button>
    </div>
    <button class="adm-new-btn" onclick="renderAdmForm(null)">+ Novo evento</button>
    <div class="adm-section">Eventos cadastrados (${eventos.length})</div>
    ${cards}
    <div style="margin-top:20px;text-align:center">
      <button class="adm-logout" onclick="doLogout()">Sair da conta admin</button>
    </div>`;
}

function renderAdmForm(id){
  admEditId = id;
  const ev = id ? eventos.find(e=>e.id===id) : null;
  document.getElementById('adm-box').innerHTML=`
    <div class="adm-hdr">
      <h2>${ev?'Editar evento':'Novo evento'}</h2>
      <button class="adm-close" onclick="renderAdmPanel()">← Voltar</button>
    </div>
    <div class="adm-field"><label>Título</label><input id="af-title" type="text" value="${ev?ev.title.replace(/"/g,'&quot;'):''}" placeholder="Nome do evento"></div>
    <div class="adm-field"><label>Data</label><input id="af-date" type="date" value="${ev?ev.date:''}"></div>
    <div class="adm-field"><label>Horário</label><input id="af-time" type="text" value="${ev?ev.time:''}" placeholder="Ex: 10:00 às 12:00"></div>
    <div class="adm-field"><label>Local</label><input id="af-local" type="text" value="${ev?ev.local.replace(/"/g,'&quot;'):''}" placeholder="Online, São Paulo..."></div>
    <div class="adm-field"><label>Descrição</label><textarea id="af-desc" rows="3">${ev?ev.desc:''}</textarea></div>
    <div class="adm-field"><label>Tipo</label>
      <select id="af-tipo">
        <option value="evento"  ${(!ev||ev.tipo==='evento') ?'selected':''}>Evento</option>
        <option value="free"    ${ev&&ev.tipo==='free'      ?'selected':''}>Gratuito p/ embaixadores</option>
        <option value="interno" ${ev&&ev.tipo==='interno'   ?'selected':''}>Interno</option>
      </select>
    </div>
    <div id="af-err" class="adm-err"></div>
    <div class="adm-btns">
      <button class="adm-cancel" onclick="renderAdmPanel()">Cancelar</button>
      <button class="adm-save" onclick="saveEvento()">Salvar</button>
    </div>`;
}

async function saveEvento(){
  const title = document.getElementById('af-title').value.trim();
  const date  = document.getElementById('af-date').value;
  if(!title||!date){ document.getElementById('af-err').textContent='Título e data são obrigatórios'; return; }
  const body = {
    title, date,
    time:  document.getElementById('af-time').value.trim(),
    local: document.getElementById('af-local').value.trim(),
    desc:  document.getElementById('af-desc').value.trim(),
    tipo:  document.getElementById('af-tipo').value,
  };
  try{
    const url  = admEditId ? `${API_URL}/admin/eventos/${admEditId}` : `${API_URL}/admin/eventos`;
    const meth = admEditId ? 'PUT' : 'POST';
    const res  = await fetch(url,{
      method:meth,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},
      body:JSON.stringify(body)
    });
    if(res.status===401){ doLogout(); return; }
    if(!res.ok){ const d=await res.json(); throw new Error(d.error||'Erro'); }
    await loadEventos();
    renderAdmPanel();
    showToast(admEditId?'✅ Evento atualizado!':'✅ Evento criado!');
  }catch(e){
    document.getElementById('af-err').textContent=e.message;
  }
}

async function delEvento(id){
  if(!confirm('Excluir este evento? Esta ação não pode ser desfeita.')) return;
  try{
    const res = await fetch(`${API_URL}/admin/eventos/${id}`,{
      method:'DELETE',
      headers:{'Authorization':'Bearer '+adminToken}
    });
    if(res.status===401){ doLogout(); return; }
    if(!res.ok) throw new Error('Erro ao excluir');
    await loadEventos();
    renderAdmPanel();
    showToast('🗑 Evento excluído.');
  }catch(e){ showToast('Erro: '+e.message); }
}

function doLogout(){
  adminToken=null;
  localStorage.removeItem('ab2l_token');
  closeAdm();
  showToast('Sessão encerrada.');
}
